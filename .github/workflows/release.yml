name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/tower-defense-*.jar
          body: |
            ## Tower Defense Mod v1.0.0
            
            Mod tower defense 2v2 pour Minecraft 1.21.4 (Fabric).
            
            ### Installation
            1. Installer [Fabric Loader](https://fabricmc.net/use/) pour Minecraft 1.21.4
            2. Installer [Fabric API](https://modrinth.com/mod/fabric-api)
            3. Télécharger `tower-defense-1.0.0.jar` ci-dessous
            4. Placer le JAR dans `.minecraft/mods/`
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
